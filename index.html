<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KegelCore: Men's Trainer</title>
  <style>
    :root { --bg: #0f0f1a; --surface: #1a1a2e; --text: #e0e0e0; --accent: #6c63ff; --border: #2a2a3e; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    .container { max-width: 480px; text-align: center; }
    h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
    .subtitle { color: var(--accent); font-size: 1.1rem; font-weight: 600; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 16px; }
    a { display: block; padding: 16px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); text-decoration: none; font-weight: 500; transition: border-color 0.2s; }
    a:hover { border-color: var(--accent); }
    .footer { margin-top: 48px; color: #666; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KegelCore</h1>
    <p class="subtitle">Men's Pelvic Floor Trainer</p>
    <div class="links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      <a href="/terms-of-service.html">Terms of Service</a>
    </div>
    <p class="footer">&copy; 2026 KegelCore. All rights reserved.</p>
  </div>
</body>
</html>
